<!-- PANEL: ADMINISTRACIÓN -->
<div id="panelAdmin" class="panel">
    <h2>⚙️ Administrar Catálogo</h2>
    <div class="admin-panel">
        <form id="formLibro">
            <input type="hidden" id="editId" value="">
            
            <div>
                <label for="titulo"><strong>📖 Título del libro</strong></label>
                <input type="text" id="titulo" placeholder="Ej: ¿El amor en quiebra?" required>
            </div>
            
            <div>
                <label for="autor"><strong>✍️ Autor</strong></label>
                <input type="text" id="autor" placeholder="Ej: P. Cesareo Gil Atrio" required>
            </div>
            
            <div style="grid-column: 1 / -1;">
                <label for="reseña"><strong>📝 Reseña</strong></label>
                <textarea id="reseña" placeholder="Describe el contenido del libro..." required></textarea>
            </div>
            
            <div>
                <label for="precio"><strong>💰 Precio (USD)</strong></label>
                <input type="number" id="precio" placeholder="Ej: 5.00" step="0.01" required>
            </div>
            
            <div>
                <label for="unidades"><strong>📦 Unidades disponibles</strong></label>
                <input type="number" id="unidades" placeholder="Ej: 10" required>
            </div>
            
            <div style="grid-column: 1 / -1;">
                <label for="imagen"><strong>🖼️ Imagen de portada</strong></label>
                <input type="file" id="imagen" accept="image/*">
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; grid-column: 1 / -1;">
                <button type="submit">💾 Guardar Libro</button>
                <button type="button" class="btn-cancelar" onclick="cancelarEdicion()">❌ Cancelar</button>
            </div>
        </form>
        <div id="mensajeAdmin" class="mensaje"></div>
    </div>
</div>
